<!doctype html>
<html>
<head>
  <title>Operaciones matematicas</title>
  <meta charset="utf-8"/>
  <body>
  

 <fieldset>

    <legend><h1>Operaciones matematicas</h1>
    </legend>
  <!-- Formulario -->
  <form id="sumaForm">
    <label for="nombre">Nombres:</label><br>
    <input type="Text" id="num1" required><br><br>

    <label for="apellido">Apellidos:</label><br>
    <input type="Text" id="num2" required><br><br>

    <label for="edad">Edad:</label><br>
    <input type="number" id="num2" required><br><br>

    <label for="correo">Correo</label><br>
    <input type="email" id="num2" required><br><br>

    
  <input type="radio" id="masculino" name="Sexo" value="masculino">
  <label for="masculino">M</label><br>

  <input type="radio" id="femenino" name="Operacion" value="femenino">
  <label for="femenino">F</label><br>

  <input type="radio" id="otro" name="Operacion" value="otro">
  <label for="otro">Otro</label><br>

    <label for="num2">Direccion</label><br>
    <input type="number" id="num2" required><br>

    <label for="num2">Telefono(opcional)</label><br>
    <input type="number" id="num2" required><br>
    

  <label for="num3">Resultado:</label><br>
    <button type="submit">imprimir</button>
    <button type="submit">limpiar</button>
  </form>

  <!-- Resultado -->
  <p id="resultado"></p>

  </fieldset>

  <script type="text/javascript">
  
  
  //alert("Hola Mundo!");
  // Capturamos el formulario
    let form = document.getElementById("sumaForm");
    let resultado = document.getElementById("resultado");

    // Escuchamos el evento submit
    form.addEventListener("submit", function(event) {
      event.preventDefault(); // Evita que se recargue la página
      let num1 = parseFloat(document.getElementById("num1").value);
      let num2 = parseFloat(document.getElementById("num2").value);
      let ban=0;

    if(!document.querySelector('input[name="Operacion"]:checked'))
      {
        alert("Selecciona una operacion");
        ban=0;
      }
      else{
        ban=1;
      }

    if(ban!=0){
      // Realizamos la operacion
      switch(document.querySelector('input[name="Operacion"]:checked').value) {
        case "suma":
          var suma = num1 + num2;
          break;
        case "resta":
          var suma = num1 - num2;
          break;
        case "multiplicacion":
          var suma = num1 * num2;
          break;
        case "divicion":
        if(num1===0 || num2===0){
            alert("Error, no se puede dividir entre 0");
            suma=0;
        }
          var suma = num1 / num2;
          
          break;
      }
      document.getElementById("num3").value = suma;
      resultado.textContent = "El resultado es: " + suma;


}
	  
    });
  
</script>
  
  
</head>

  
</body>
</html>
